<style>
  .subtitle { margin: 0 0 16px; color: #555; font-size: 0.9rem; }
  .full-width { width: 100%; }
  .error-msg { color: #c62828; font-size: 0.85rem; margin-top: -8px; }
  h2[mat-dialog-title] { display: flex; align-items: center; gap: 8px; }
</style>

<h2 mat-dialog-title>
  <mat-icon>lock_reset</mat-icon>
  Change Password
</h2>

<mat-dialog-content>
  <p class="subtitle">Setting new password for <strong>{{ data.username }}</strong></p>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>New Password</mat-label>
    <input
      matInput
      [type]="showNew ? 'text' : 'password'"
      [(ngModel)]="newPassword"
      placeholder="Enter new password"
      autocomplete="new-password"
    />
    <button mat-icon-button matSuffix type="button" (click)="showNew = !showNew" tabindex="-1">
      <mat-icon>{{ showNew ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Confirm Password</mat-label>
    <input
      matInput
      [type]="showConfirm ? 'text' : 'password'"
      [(ngModel)]="confirmPassword"
      placeholder="Repeat new password"
      autocomplete="new-password"
    />
    <button mat-icon-button matSuffix type="button" (click)="showConfirm = !showConfirm" tabindex="-1">
      <mat-icon>{{ showConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    @if (passwordMismatch) {
      <mat-error>Passwords do not match</mat-error>
    }
  </mat-form-field>

  @if (error) {
    <p class="error-msg">{{ error }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false" [disabled]="saving">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="save()"
    [disabled]="saving || !newPassword || !confirmPassword || passwordMismatch"
  >
    @if (saving) { Saving… } @else { Save Password }
  </button>
</mat-dialog-actions>
