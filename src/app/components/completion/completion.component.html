<div class="completion-wrapper">
  <mat-card class="completion-card" appearance="outlined">
    <mat-card-content>
      <div class="trophy-icon">🏆</div>
      <h2 class="title">Pool Complete!</h2>
      <p class="subtitle">You have reviewed all available words in your active pool.</p>

      <mat-divider></mat-divider>

      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-value">{{ total() }}</span>
          <span class="stat-label">Total Words</span>
        </div>
        <div class="stat-item accent">
          <span class="stat-value">{{ learntCount() }}</span>
          <span class="stat-label">Learnt</span>
        </div>
        <div class="stat-item muted">
          <span class="stat-value">{{ skippedCount() }}</span>
          <span class="stat-label">Skipped</span>
        </div>
      </div>

      <mat-divider></mat-divider>

      <p class="action-label">What would you like to do next?</p>

      <div class="action-buttons">
        <button
          mat-stroked-button
          color="primary"
          (click)="reset.emit('skipped')"
          [disabled]="skippedCount() === 0"
        >
          <mat-icon>replay</mat-icon>
          Review Skipped ({{ skippedCount() }})
        </button>

        <button
          mat-stroked-button
          color="accent"
          (click)="reset.emit('learnt')"
          [disabled]="learntCount() === 0"
        >
          <mat-icon>school</mat-icon>
          Re-test Learnt ({{ learntCount() }})
        </button>

        <button mat-flat-button color="primary" (click)="reset.emit('all')">
          <mat-icon>refresh</mat-icon>
          Start Over (All {{ total() }})
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
