<div class="page">
  <mat-card class="card">
    <mat-card-header>
      <mat-icon mat-card-avatar class="header-icon">lock</mat-icon>
      <mat-card-title>Change Password</mat-card-title>
      <mat-card-subtitle>Update your account password</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="field">
        <mat-label>Current Password</mat-label>
        <input
          matInput
          [type]="showCurrent ? 'text' : 'password'"
          [(ngModel)]="currentPw"
          autocomplete="current-password"
          (keyup.enter)="save()"
        />
        <button mat-icon-button matSuffix type="button" (click)="showCurrent = !showCurrent" tabindex="-1">
          <mat-icon>{{ showCurrent ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>New Password</mat-label>
        <input
          matInput
          [type]="showNew ? 'text' : 'password'"
          [(ngModel)]="newPw"
          autocomplete="new-password"
          (keyup.enter)="save()"
        />
        <button mat-icon-button matSuffix type="button" (click)="showNew = !showNew" tabindex="-1">
          <mat-icon>{{ showNew ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <mat-form-field appearance="outline" class="field">
        <mat-label>Confirm New Password</mat-label>
        <input
          matInput
          [type]="showConfirm ? 'text' : 'password'"
          [(ngModel)]="confirmPw"
          autocomplete="new-password"
          (keyup.enter)="save()"
        />
        <button mat-icon-button matSuffix type="button" (click)="showConfirm = !showConfirm" tabindex="-1">
          <mat-icon>{{ showConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (mismatch) {
          <mat-error>Passwords do not match</mat-error>
        }
      </mat-form-field>

      @if (error) {
        <p class="error-msg">
          <mat-icon>error_outline</mat-icon>
          {{ error }}
        </p>
      }
    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/" [disabled]="saving">Cancel</button>
      <button
        mat-flat-button
        color="primary"
        (click)="save()"
        [disabled]="saving || !currentPw || !newPw || !confirmPw || mismatch"
      >
        <mat-icon>save</mat-icon>
        {{ saving ? 'Saving…' : 'Update Password' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
